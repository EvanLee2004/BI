<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>甲骨易·经营看板</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
    <script>
      try {
        var v2 = localStorage.getItem('cockpit-theme-v2')
        var t = localStorage.getItem('cockpit-theme')
        if (!v2) {
          t = 'neon'
          localStorage.setItem('cockpit-theme', 'neon')
          localStorage.setItem('cockpit-theme-v2', '1')
        }
        if (t !== 'neon' && t !== 'dark' && t !== 'light') t = 'neon'
        document.documentElement.setAttribute('data-theme', t)
        if (t === 'light') document.documentElement.classList.add('theme-light')
        else document.documentElement.classList.remove('theme-light')
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/static/css/theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
