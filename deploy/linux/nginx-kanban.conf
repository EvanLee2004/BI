# 甲骨易经营看板 · nginx 生产标准架构（Ubuntu 26.04 · 任务书50·D / 43 方案 B）
# 用法见 docs/Ubuntu部署手册.md：
#   sudo cp deploy/linux/nginx-kanban.conf /etc/nginx/sites-available/kanban
#   改 root / proxy 路径后：sudo ln -sf .../kanban /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 生产标准（双进程）：
#   :80  → 本文件：frontend/dist 静态（immutable）+ index.html no-store
#         + /api/* /admin /bu /login 反代 127.0.0.1:8018
#   :8018 → uvicorn 仅回环（server_host=127.0.0.1 / serve_static=false）
# 简易模式（开发机/Windows）：run.py --serve 单进程自带 dist+API，见 MADR-0009
#
# 选型：发行版 nginx（apt install nginx），不自写反代。
#
# 注意：nginx 子 location 一旦写了 add_header，不会继承 server 级 add_header；
# 凡带 Cache-Control 的 location 必须重复安全头（任务书64·D8）。

upstream kanban_api {
    server 127.0.0.1:8018;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # 任务书64·D8：不暴露 nginx 版本；基础安全头
    # X-Frame-Options 必须 SAMEORIGIN（管理端「看」iframe 嵌 /；DENY 会空白）
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vue 构建产物（安装时 sed 替换为真实绝对路径）
    root /opt/kanban/看板正式程序/frontend/dist;
    client_max_body_size 32m;

    # gzip 由 nginx 做（后端 GZipMiddleware 仅简易单进程模式仍开）
    gzip on;
    gzip_types text/css application/javascript application/json text/html application/xml image/svg+xml;
    gzip_min_length 1000;

    # —— 动态：API / 登录 / 管理端 / BU 页 / 导出 —— 反代后端
    # 2.2.7：export.html 必须进反代（否则 try_files 落 SPA index，匿名 200 无鉴权）
    location ~ ^/(api|admin|login|bu|export\.(png|html))(/|$) {
        proxy_pass http://kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        # 无本 location 其它 add_header → 继承 server 安全头
    }

    # 指纹资产长缓存
    location /app/assets/ {
        alias /opt/kanban/看板正式程序/frontend/dist/assets/;
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # legacy static（theme.css 等）
    location /static/ {
        alias /opt/kanban/看板正式程序/static/;
        expires 7d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA 入口：index.html 永不缓存
    location = / {
        try_files /index.html @backend;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html @backend;
    }

    location @backend {
        proxy_pass http://kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store" always;
    }
}
