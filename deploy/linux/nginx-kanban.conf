# 甲骨易智能经营罗盘 · nginx 反代模板（Ubuntu 方案 B · 任务书43）
# 用法见 docs/Ubuntu部署手册.md § nginx：
#   sudo cp deploy/linux/nginx-kanban.conf /etc/nginx/sites-available/kanban
#   改 root / proxy 路径后：sudo ln -sf .../kanban /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 分工：
#   :80  → 本文件：静态 long-cache + HTML no-store；动态反代 127.0.0.1:8018
#   :8018 → kanban.service：仅绑 127.0.0.1（server_host=127.0.0.1 / serve_static=false）
# 直连模式（无 nginx）：server_host=0.0.0.0 + serve_static=true，FastAPI 自带 /static（现状兼容）
#
# 选型：发行版 nginx（apt install nginx），不自写反代。

upstream kanban_api {
    server 127.0.0.1:8018;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 程序 static/ 绝对路径——安装时 sed 替换
    root /opt/kanban/看板正式程序/static;
    client_max_body_size 32m;

    # gzip 由 nginx 做（后端 GZipMiddleware 仅直连模式仍开，双模并存）
    gzip on;
    gzip_types text/css application/javascript application/json text/html application/xml image/svg+xml;
    gzip_min_length 1000;

    # —— 动态：API / 登录 / 管理端 / BU 页 / 导出 —— 反代后端
    location ~ ^/(api|admin|login|bu|export\.png)(/|$) {
        proxy_pass http://kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    # 根路径：壳页（会话态 HTML no-store，与现有铁律一致）
    location = / {
        proxy_pass http://kanban_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    # 带指纹/版本的静态资产长缓存（css/js/img）
    location /static/ {
        alias /opt/kanban/看板正式程序/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # 其它 HTML 壳（shell / login 若被静态命中）
    location ~* \.html$ {
        add_header Cache-Control "no-store" always;
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass http://kanban_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
