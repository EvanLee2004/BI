# 看板正式程序 · pre-commit（版本钉死 2026-07-16 核实）
# 安装（仅开发机）:
#   python -m pip install pre-commit==4.6.0 -i https://pypi.tuna.tsinghua.edu.cn/simple
#   pre-commit install
#   pre-commit install --hook-type commit-msg
# 全量:
#   pre-commit run --all-files
#
# 出处：
#   ruff-pre-commit https://github.com/astral-sh/ruff-pre-commit MIT
#   gitleaks https://github.com/gitleaks/gitleaks MIT
#   pre-commit-hooks https://github.com/pre-commit/pre-commit-hooks MIT
#   conventional-pre-commit https://github.com/compilerla/conventional-pre-commit Apache-2.0

default_language_version:
  python: python3

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(golden/|static/templates/)'
      - id: end-of-file-fixer
        exclude: '^(golden/|static/templates/)'
      - id: check-yaml
      - id: check-json
        exclude: '^(golden/|docs/.*样例.*\.json$)'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --verbose]
