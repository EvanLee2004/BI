# 看板正式程序 · gitleaks 项目配置
# 继承默认规则 + 本项目敏感路径/模式
# 文档: https://github.com/gitleaks/gitleaks · MIT · v8.30.1

title = "kanban-gitleaks"

[extend]
useDefault = true

# ---------- 全局放行（已知安全 / 出厂允许）----------
[[allowlists]]
description = "合成样例、文档、默认 seed 口令、出厂 config 内网 UNC"
paths = [
  '''docs/看板账号样例\.json$''',
  '''docs/BU配置样例\.json$''',
  '''docs/softeng/''',
  '''docs/''',
  '''golden/''',
  '''tests/''',
  '''tests/fixtures/''',
  '''CLAUDE\.md$''',
  '''README\.md$''',
  '''AGENTS\.md$''',
  '''\.gitignore$''',
  '''\.gitleaks\.toml$''',
  '''\.pre-commit-config\.yaml$''',
]
regexes = [
  '''kanban2026''',
  '''(?i)password["']?\s*[:=]\s*["']8888["']''',
  '''DEFAULT_ADMIN_PW\s*=\s*"kanban2026"''',
  '''DEFAULT_VIEW_PW\s*=\s*"8888"''',
]

[[allowlists]]
description = "源码中仅「文件名字符串/路径常量」提及凭据文件名（非真实密钥内容）"
paths = [
  '''(^|/)src/''',
  '''(^|/)static/''',
]
regexes = [
  '''看板账号\.json''',
  '''管理员密钥\.json''',
  '''智云配置\.json''',
  '''md_pss_id''',
  '''account_id''',
]

[[allowlists]]
description = "铁律6：config.json 收单台账 UNC 出厂默认允许含 192.168"
paths = ['''(^|/)config\.json$''']
regexes = ['''192\.168\.\d{1,3}\.\d{1,3}''']

# ---------- 规则：敏感文件名（路径即泄露）----------
[[rules]]
id = "kanban-forbidden-data-files"
description = "禁止提交数据目录敏感配置/库/表（真实账号、密钥、智云 cookie、经营库）"
regex = '''.'''
path = '''(?i)(?:^|/)数据/(?:看板账号|管理员密钥|智云配置|本地配置|BU配置)\.json$|(?:^|/)数据/.*\.(?:db|xlsx|csv)$|(?:^|/)数据/(?:备份|快照存档|1_原始下载)/'''
tags = ["kanban", "path", "secret"]

[[rules]]
id = "kanban-forbidden-filename-anywhere"
description = "任何路径出现真实凭据文件名都报警（防挪到仓库其他位置）"
regex = '''(?i)(看板账号\.json|管理员密钥\.json|智云配置\.json)'''
tags = ["kanban", "filename"]

# ---------- 规则：内网 IP（非常规位置）----------
[[rules]]
id = "kanban-private-ip-192-168"
description = "检出 192.168.x.x（config.json 已 allowlist；其他文件需人工确认）"
regex = '''\b192\.168\.(?:25[0-5]|2[0-4]\d|[01]?\d?\d)\.(?:25[0-5]|2[0-4]\d|[01]?\d?\d)\b'''
tags = ["kanban", "internal-ip"]

# ---------- 规则：cookie / token 字段（中英）----------
[[rules]]
id = "kanban-zhiyun-session-fields"
description = "智云会话/密码字段写入仓库"
regex = '''(?i)(?:"|')?(?:md_pss_id|account_id|cookie_key|password|密码|会话)(?:"|')?\s*:\s*(?:"|')[^"'\s]{8,}'''
entropy = 2.5
tags = ["kanban", "session"]

[[rules]]
id = "kanban-cny-amount-suspicious"
description = "可疑人民币大额展示串（请确认是否为合成测试数据）"
regex = '''¥\s*-?\d{1,3}(?:,\d{3})+(?:\.\d+)?\s*万|价税合计[：:]\s*\d{5,}'''
path = '''(?i)\.(?:py|md|json|html|txt|log)$'''
tags = ["kanban", "amount", "weak"]

[[rules.allowlists]]
description = "测试与 golden 中的金额串允许"
paths = [
  '''(^|/)tests/''',
  '''(^|/)golden/''',
  '''docs/.*\.md$''',
]
