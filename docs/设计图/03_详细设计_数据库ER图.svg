<svg viewBox="0 0 920 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>看板.db ER图（v1.2 · 对齐 schema.py · 2026-07-15）</title>
<desc>std_ 五表 + adj_/manual_/meta_ 人工表；无物理外键，调整靠(目标表+定位键)逻辑关联</desc>
<style>
.h{fill:#1f2937;font-size:12px;font-weight:700}
.f{fill:#4b5563;font-size:10px}
.k{fill:#1d4ed8;font-size:10px;font-weight:600}
.lbl{fill:#6b7280;font-size:11px;font-weight:600}
.rt{fill:#d97706;font-size:11px;font-weight:600}
