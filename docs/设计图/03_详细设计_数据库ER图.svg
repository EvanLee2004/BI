<!-- 人工表区 -->
<text x="20" y="230" class="lbl">② 人工数据表 adj_ / manual_ / meta_（重建永不清 · 只追加或按主键覆盖）</text>

<rect x="16" y="240" width="220" height="148" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="28" y="260" class="h">adj_调整记录（只追加）</text>
<text x="28" y="278" class="k">PK id</text>
<text x="28" y="294" class="f">创建时间 · 经手人</text>
<text x="28" y="308" class="f">目标表 · 定位键 · 字段</text>
<text x="28" y="322" class="f">原值 · 新值 · 原因</text>
<text x="28" y="336" class="f">类型：改值 | 剔除</text>
<text x="28" y="350" class="f">状态：生效 | 过期疑似 | 已撤销</text>
<text x="28" y="370" class="xs">逻辑关联 std_* · 非外键</text>

<rect x="248" y="240" width="200" height="100" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="260" y="260" class="h">manual_手填</text>
<text x="260" y="278" class="k">PK (归属月, 项目)</text>
<text x="260" y="294" class="f">金额 · 填写时间 · 经手人</text>
<text x="260" y="310" class="f">当月未填=0（不沿用上月）</text>
<text x="260" y="326" class="xs">全公司手填项</text>

<rect x="460" y="240" width="200" height="100" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="472" y="260" class="h">manual_手填BU</text>
<text x="472" y="278" class="k">PK (归属月, 范围, 项目)</text>
<text x="472" y="294" class="f">金额 · 填写时间 · 经手人</text>
<text x="472" y="310" class="f">范围=BU 名</text>
<text x="472" y="326" class="xs">与全公司表并存</text>

<rect x="672" y="240" width="232" height="100" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="684" y="260" class="h">manual_分摊比例</text>
<text x="684" y="278" class="k">PK (归属月, BU)</text>
<text x="684" y="294" class="f">比例 0~100 · 填写时间 · 经手人</text>
<text x="684" y="310" class="f">合计可&lt;100% · 沿用最近填写月</text>
<text x="684" y="326" class="xs">公共费用 → BU 页 / 构成视图</text>

<rect x="248" y="352" width="200" height="88" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="260" y="372" class="h">manual_费用去税率</text>
<text x="260" y="390" class="k">PK 费用类别</text>
<text x="260" y="406" class="f">税率 · 填写时间 · 经手人</text>
<text x="260" y="422" class="xs">空=不去税 · 源头统一换算</text>

<rect x="460" y="352" width="200" height="88" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="472" y="372" class="h">manual_预算</text>
<text x="472" y="390" class="k">PK (年份, 指标, 范围)</text>
<text x="472" y="406" class="f">金额 · 填写时间 · 经手人</text>
<text x="472" y="422" class="xs">范围默认全公司 / 可部门</text>

<rect x="672" y="352" width="232" height="88" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="684" y="372" class="h">manual_配置变更（C3 留痕）</text>
<text x="684" y="390" class="k">PK id · 只追加</text>
<text x="684" y="406" class="f">时间 · 操作账号 · 类别 · 摘要</text>
<text x="684" y="422" class="xs">绝不存密码明文</text>

<rect x="16" y="400" width="220" height="72" rx="7" fill="#06b6d41a" stroke="#0891b2"/>
<text x="28" y="420" class="h">meta_运行日志</text>
<text x="28" y="438" class="k">PK id</text>
<text x="28" y="454" class="f">时间 · 触发方式 · 结果绿|黄|红 · 体检JSON</text>

<rect x="248" y="452" width="200" height="56" rx="7" fill="#f59e0b1a" stroke="#d97706"/>
<text x="260" y="472" class="h">manual_历史 / 预算历史</text>
<text x="260" y="490" class="f">手填与预算改动的旧→新值流水</text>

<!-- 库外配置 -->
<text x="20" y="530" class="lbl">③ 库外配置文件（数据/ · 不进 git · 非 SQLite）</text>
<rect x="16" y="540" width="280" height="70" rx="7" fill="#6366f11a" stroke="#6366f1"/>
<text x="28" y="560" class="h">看板账号.json</text>
<text x="28" y="578" class="f">权限：管理员 / 整体 / BU（可绑多 BU）</text>
<text x="28" y="594" class="f">明文密码 · 仅管理员会话可读</text>

<rect x="308" y="540" width="280" height="70" rx="7" fill="#6366f11a" stroke="#6366f1"/>
<text x="320" y="560" class="h">BU配置.json</text>
<text x="320" y="578" class="f">BU 名 + 销售名单 = 子页过滤口径</text>
<text x="320" y="594" class="f">无密码字段 · 与账号表解耦</text>

<rect x="600" y="540" width="304" height="70" rx="7" fill="#6366f11a" stroke="#6366f1"/>
<text x="612" y="560" class="h">智云配置.json · 本地配置.json</text>
<text x="612" y="578" class="f">智云账号/token · 台账路径/调度等覆盖</text>
<text x="612" y="594" class="f">程序永不写 config.json（铁律19）</text>

<!-- 约定 -->
<rect x="16" y="628" width="888" height="132" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="28" y="650" class="lbl">约定（与代码一致）</text>
<text x="28" y="670" class="f">· 金额 REAL(元) · 日期 TEXT ISO · 归属月 TEXT(YYYY-MM) · 定位键=内容哈希（不当主键，防同 ID 多月变体塌行）</text>
<text x="28" y="688" class="f">· 调整逻辑关联：adj 用 (目标表 + 定位键 + 字段) 套到 std_*；原值≠库中现值 → 状态「过期疑似」；剔除=已删除=1 软删</text>
<text x="28" y="706" class="f">· profit 只读库：std + manual_手填(+BU) + 分摊比例 + 去税率 + 预算 → summary；账号/BU 配置在 JSON 不在库</text>
<text x="28" y="724" class="f">· 已废弃：suspect_待确认（R0 删除，连接时 DROP）· 旧 ER 写「PK=订单号」已作废 → 现为自增 id</text>
<text x="28" y="744" class="rt">v1.2 · 对齐 schema · 图注 2026-07-20 对齐 schema.py 全表（补 手填BU / 分摊比例 / 去税率 / 配置变更 / 历史 · 去掉 suspect 占位框）</text>
</svg>
