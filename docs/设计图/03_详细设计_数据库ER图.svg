<text x="388" y="108" class="k">PK id · 定位键</text>
<text x="388" y="124" class="f">回款ID · 到账日期 · 到账金额</text>
<text x="388" y="138" class="f">客户 · 销售</text>
<text x="388" y="152" class="f">归属月 · 原值_归属月 · 已删除</text>
<text x="388" y="184" class="xs">← 回款记录（智云）</text>

<rect x="556" y="70" width="172" height="132" rx="7" fill="#10b9811a" stroke="#059669"/>
<text x="568" y="90" class="h">std_内部译员</text>
<text x="568" y="108" class="k">PK id · 定位键</text>
<text x="568" y="124" class="f">任务ID · 任务提交日期</text>
<text x="568" y="138" class="f">结算金额 · 译员类型 · 销售</text>
<text x="568" y="152" class="f">归属月 · 原值_归属月 · 已删除</text>
