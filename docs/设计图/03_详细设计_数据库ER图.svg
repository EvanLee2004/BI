</style>
<rect x="0" y="0" width="920" height="780" fill="#ffffff"/>

<text x="460" y="22" class="h" text-anchor="middle" font-size="14">看板.db · 数据模型 v1.2（src/schema.py 唯一源 · 产品 v2.0.0-rc12）</text>
<text x="460" y="38" class="xs" text-anchor="middle">标准表每次全量重建永不手改 · 人工表重建永不清 · 无 FK（逻辑关联）· PK=自增 id（定位键=内容哈希索引）</text>

<!-- 标准表区 -->
<text x="20" y="60" class="lbl">① 标准数据表 std_*（程序生成 · 每次更新全量重建 · 永不手改）</text>

<rect x="16" y="70" width="172" height="132" rx="7" fill="#10b9811a" stroke="#059669"/>
<text x="28" y="90" class="h">std_收入明细</text>
