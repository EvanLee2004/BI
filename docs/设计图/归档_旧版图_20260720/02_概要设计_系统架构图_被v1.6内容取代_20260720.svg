<svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>系统架构 v2.0（五层单向 · Vue + nginx 生产）</title>
<desc>抓数→清洗→存储→计算→展示；生产 nginx 发 dist 反代 API</desc>
<style>
.h{fill:#0f172a;font-size:15px;font-weight:700}
.t{fill:#0f172a;font-size:12px;font-weight:600}
.s{fill:#334155;font-size:11px}
.xs{fill:#64748b;font-size:10px}
.lbl{fill:#475569;font-size:11px;font-weight:700}
</style>
<rect width="960" height="720" fill="#ffffff"/>
<text x="480" y="26" class="h" text-anchor="middle">甲骨易智能经营罗盘 · 系统架构 v2.0</text>
<text x="480" y="46" class="xs" text-anchor="middle">产品 v2.0.0-rc12 · 五层单向 · Vue3 dist + API v1(VM) · Ubuntu/nginx · 前端零金额运算</text>

<!-- ① 抓数 -->
<rect x="40" y="64" width="880" height="88" rx="12" fill="#eff6ff" stroke="#3b82f6"/>
<text x="56" y="90" class="lbl">① 抓数层 · 进料口唯一接缝</text>
<rect x="56" y="102" width="160" height="36" rx="6" fill="#fff" stroke="#3b82f6"/>
<text x="136" y="125" class="s" text-anchor="middle">智云四源 API</text>
<rect x="232" y="102" width="160" height="36" rx="6" fill="#fff" stroke="#3b82f6"/>
<text x="312" y="125" class="s" text-anchor="middle">收单台账 SMB/CIFS</text>
<rect x="408" y="102" width="160" height="36" rx="6" fill="#fff" stroke="#3b82f6"/>
<text x="488" y="125" class="s" text-anchor="middle">管理端手填表单</text>
<rect x="584" y="102" width="160" height="36" rx="6" fill="#fff" stroke="#3b82f6"/>
<text x="664" y="125" class="s" text-anchor="middle">数据/*.xlsx 落盘</text>
<rect x="760" y="102" width="140" height="36" rx="6" fill="#fff" stroke="#3b82f6"/>
<text x="830" y="125" class="s" text-anchor="middle">失败→黄灯沿用</text>

<!-- ② 清洗 -->
<rect x="40" y="168" width="880" height="72" rx="12" fill="#ecfeff" stroke="#0891b2"/>
<text x="56" y="194" class="lbl">② 清洗层 · src/ingest/</text>
<text x="56" y="218" class="s">规范化 · 行哈希定位键 · 重放人工调整（adj_）· validate 体检 · 月末快照</text>

<!-- ③ 存储 -->
<rect x="40" y="256" width="420" height="100" rx="12" fill="#ecfdf5" stroke="#059669"/>
<text x="56" y="282" class="lbl">③ 存储层 · SQLite 看板.db</text>
<text x="56" y="304" class="s">std_ 标准五表 · adj_调整 · manual_*</text>
<text x="56" y="322" class="s">meta_运行日志 · 读连接 mode=ro</text>
<text x="56" y="340" class="xs">库是后端私产 · 浏览器从不直连</text>

<rect x="480" y="256" width="440" height="100" rx="12" fill="#f8fafc" stroke="#94a3b8"/>
<text x="496" y="282" class="lbl">配置（JSON · 不进库）</text>
<text x="496" y="304" class="s">看板账号.json · BU配置.json</text>
<text x="496" y="322" class="s">config.json 口径 · 本地配置覆盖层</text>
<text x="496" y="340" class="xs">智云配置 / 管理员密钥 · gitignore</text>

<!-- ④ 计算 -->
<rect x="40" y="372" width="880" height="88" rx="12" fill="#f5f3ff" stroke="#7c3aed"/>
<text x="56" y="398" class="lbl">④ 计算层 · domain / profit · db · core</text>
<text x="56" y="422" class="s">只读库 · 纯函数 · 32 周期 summary 红线 · BU 销售过滤 · 分摊/去税/排名 · 前端零运算</text>
<text x="56" y="442" class="xs">api_v1 / VM 只序列化已算好的结果 · 不算账</text>

<!-- ⑤ 展示 -->
<rect x="40" y="476" width="880" height="130" rx="12" fill="#fdf2f8" stroke="#db2777"/>
<text x="56" y="502" class="lbl">⑤ 展示层 · 生产 nginx + Vue</text>
<rect x="56" y="516" width="200" height="72" rx="8" fill="#0f766e"/>
<text x="156" y="544" fill="#ecfeff" font-size="12" font-weight="700" text-anchor="middle">nginx :80</text>
<text x="156" y="564" fill="#ccfbf1" font-size="10" text-anchor="middle">dist 静态 + API 反代</text>

<rect x="272" y="516" width="200" height="72" rx="8" fill="#fff" stroke="#db2777"/>
<text x="372" y="540" class="t" text-anchor="middle">看端 Vue3</text>
<text x="372" y="560" class="xs" text-anchor="middle">frontend/dist · ECharts</text>
<text x="372" y="574" class="xs" text-anchor="middle">GET /api/v1/vm/*</text>

<rect x="488" y="516" width="200" height="72" rx="8" fill="#fff" stroke="#d97706"/>
<text x="588" y="540" class="t" text-anchor="middle">管理端 Vue+EP</text>
<text x="588" y="560" class="xs" text-anchor="middle">Element Plus 深空</text>
<text x="588" y="574" class="xs" text-anchor="middle">/admin · 改数/更新/账号</text>

<rect x="704" y="516" width="196" height="72" rx="8" fill="#1e3a5f"/>
<text x="802" y="540" fill="#e0f2fe" font-size="12" font-weight="700" text-anchor="middle">FastAPI :8018</text>
<text x="802" y="560" fill="#bae6fd" font-size="10" text-anchor="middle">生产仅 127.0.0.1</text>
<text x="802" y="574" fill="#bae6fd" font-size="10" text-anchor="middle">routes · auth · login_guard</text>

<!-- 契约 -->
<rect x="40" y="622" width="880" height="78" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="56" y="646" class="lbl">契约与边界</text>
<text x="56" y="668" class="s">进料口唯一接缝 · 库仅后端 · 抓数可降级不中断 · 账号分流（整体/BU/管理员）· 明细白名单任意会话 · logout/改密踢会话</text>
<text x="56" y="686" class="xs">开发：vite proxy · 简易：KANBAN_OFFLINE 单进程发 dist · 生产：唯一线 = Ubuntu + nginx + systemd · Windows 已退役</text>
</svg>
