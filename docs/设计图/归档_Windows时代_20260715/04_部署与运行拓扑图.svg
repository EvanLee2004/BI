<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>部署与运行拓扑（v1.4.0-beta · 2026-07-15）</title>
<desc>Windows 单机内网：看门狗常驻 + 计划任务更新 + 外源 + 浏览器端</desc>
<style>
.h{fill:#1f2937;font-size:13px;font-weight:700}
.t{fill:#1f2937;font-size:12px;font-weight:600}
.s{fill:#4b5563;font-size:11px}
.xs{fill:#6b7280;font-size:10px}
.lbl{fill:#6b7280;font-size:11px;font-weight:600}
.ln{stroke:#7a8699;stroke-width:1.5;fill:none;marker-end:url(#ar)}
.ld{stroke:#059669;stroke-width:1.5;fill:none;marker-end:url(#ag);stroke-dasharray:4 3}
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#7a8699"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
</defs>
<rect x="0" y="0" width="900" height="620" fill="#ffffff"/>
<text x="450" y="24" class="h" text-anchor="middle" font-size="14">部署与运行拓扑 · Windows 内网单机</text>
<text x="450" y="42" class="xs" text-anchor="middle">产品 v1.4.0-beta · 无 Docker / 无公网 · 看门狗常驻 + 计划任务日更 + 浏览器访问</text>

<!-- 外部系统 -->
<text x="20" y="68" class="lbl">外部系统（公司内网）</text>
<rect x="20" y="78" width="160" height="70" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="100" y="105" class="t" text-anchor="middle">智云（明道云）</text>
<text x="100" y="124" class="xs" text-anchor="middle">四源 API · 账号密码登录</text>
<text x="100" y="138" class="xs" text-anchor="middle">login_zhiyun + fetch_zhiyun</text>

<rect x="200" y="78" width="160" height="70" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="280" y="105" class="t" text-anchor="middle">SMB 共享盘</text>
<text x="280" y="124" class="xs" text-anchor="middle">收单台账 Excel</text>
<text x="280" y="138" class="xs" text-anchor="middle">ingest/fetch.py</text>

<rect x="380" y="78" width="160" height="70" rx="8" fill="#8b5cf61a" stroke="#7c3aed"/>
<text x="460" y="105" class="t" text-anchor="middle">代码远端</text>
<text x="460" y="124" class="xs" text-anchor="middle">GitHub / Gitee</text>
<text x="460" y="138" class="xs" text-anchor="middle">一键更新 git pull --ff-only</text>

<!-- 部署机 -->
<rect x="20" y="180" width="860" height="280" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
<text x="36" y="204" class="h">Windows 部署机（财务部 / 内网）</text>
<text x="36" y="222" class="xs">唯一常驻进程 = 看门狗循环跑 --serve · 管道跑完即退 · 崩了昨日页仍可看（若有页面缓存）</text>

<!-- 进程 -->
<rect x="40" y="240" width="200" height="100" rx="8" fill="#10b9811a" stroke="#059669"/>
<text x="140" y="265" class="t" text-anchor="middle">看门狗启动.bat</text>
<text x="140" y="285" class="s" text-anchor="middle">循环：python run.py --serve</text>
<text x="140" y="303" class="xs" text-anchor="middle">退出码 42 → 用新代码重启</text>
<text x="140" y="321" class="xs" text-anchor="middle">坏版本 → 自动回滚一次</text>

<rect x="260" y="240" width="200" height="100" rx="8" fill="#10b9811a" stroke="#059669"/>
<text x="360" y="265" class="t" text-anchor="middle">Windows 计划任务</text>
<text x="360" y="285" class="s" text-anchor="middle">可多时段（设置页）</text>
<text x="360" y="303" class="xs" text-anchor="middle">run.py --scheduled</text>
<text x="360" y="321" class="xs" text-anchor="middle">抓数→建库→算→出页</text>

<rect x="480" y="240" width="380" height="100" rx="8" fill="#ec48991a" stroke="#db2777"/>
<text x="670" y="265" class="t" text-anchor="middle">FastAPI 服务 :8018（默认）</text>
<text x="670" y="285" class="s" text-anchor="middle">/ 账号分流 · /admin · /bu/{name}</text>
<text x="670" y="303" class="xs" text-anchor="middle">/static/* · /api/* · /api/v1/* · /export.png</text>
<text x="670" y="321" class="xs" text-anchor="middle">KANBAN_PORT / KANBAN_OFFLINE 可覆盖</text>

<!-- 磁盘 -->
<rect x="40" y="360" width="260" height="80" rx="8" fill="#f59e0b1a" stroke="#d97706"/>
<text x="170" y="385" class="t" text-anchor="middle">数据/（gitignore）</text>
<text x="170" y="405" class="xs" text-anchor="middle">6×xlsx · 看板.db · 账号/BU/智云配置</text>
<text x="170" y="423" class="xs" text-anchor="middle">本地配置.json · 备份/快照</text>

<rect x="320" y="360" width="240" height="80" rx="8" fill="#06b6d41a" stroke="#0891b2"/>
<text x="440" y="385" class="t" text-anchor="middle">代码目录（git）</text>
<text x="440" y="405" class="xs" text-anchor="middle">src/ · static/ · config.json · tests/</text>
<text x="440" y="423" class="xs" text-anchor="middle">.venv · requirements.txt · VERSION</text>

<rect x="580" y="360" width="280" height="80" rx="8" fill="#8b5cf61a" stroke="#7c3aed"/>
<text x="720" y="385" class="t" text-anchor="middle">output/ + 页面缓存</text>
<text x="720" y="405" class="xs" text-anchor="middle">经营驾驶舱.html · 历史快照</text>
<text x="720" y="423" class="xs" text-anchor="middle">导出 PNG 临时产物</text>

<!-- 客户端 -->
<text x="20" y="490" class="lbl">内网客户端（浏览器 · 手机连公司 Wi‑Fi 也可）</text>
<rect x="20" y="500" width="200" height="56" rx="8" fill="#ec48991a" stroke="#db2777"/>
<text x="120" y="522" class="t" text-anchor="middle">整体账号</text>
<text x="120" y="540" class="xs" text-anchor="middle">全公司驾驶舱 · 导出</text>

<rect x="240" y="500" width="200" height="56" rx="8" fill="#ec48991a" stroke="#db2777"/>
<text x="340" y="522" class="t" text-anchor="middle">BU 账号</text>
<text x="340" y="540" class="xs" text-anchor="middle">仅本 BU · 严格隔离</text>

<rect x="460" y="500" width="200" height="56" rx="8" fill="#f59e0b1a" stroke="#d97706"/>
<text x="560" y="522" class="t" text-anchor="middle">管理员账号</text>
<text x="560" y="540" class="xs" text-anchor="middle">/admin 改数 · 设置 · 更新</text>

<rect x="680" y="500" width="200" height="56" rx="8" fill="#6366f11a" stroke="#6366f1"/>
<text x="780" y="522" class="t" text-anchor="middle">外部系统（可选）</text>
<text x="780" y="540" class="xs" text-anchor="middle">GET /api/v1/cockpit JSON</text>

<!-- 箭头说明 -->
<path class="ld" d="M100 148 L100 180"/>
<path class="ld" d="M280 148 L280 180"/>
<path class="ln" d="M460 148 L600 240"/>
<path class="ln" d="M140 340 L140 360"/>
<path class="ln" d="M670 340 L720 360"/>
<path class="ln" d="M450 480 L120 500"/>
<path class="ln" d="M500 480 L340 500"/>
<path class="ln" d="M600 480 L560 500"/>

<text x="20" y="590" class="s">绿虚线=抓数进料 · 灰实线=进程/访问关系 · 不暴露公网 · 装机步骤见 docs/Windows部署手册.md</text>
<text x="20" y="608" class="xs">可选：前置 Caddy basicauth（手册有两档访问控制说明）· 本图画默认「看板自带账号」形态</text>
</svg>
