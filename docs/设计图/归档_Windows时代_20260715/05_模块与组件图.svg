<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>模块与组件图（v1.5.0-beta · 对齐 src/）</title>
<desc>代码目录职责与依赖方向：run → ingest/profit → render/server/static</desc>
<style>
.h{fill:#1f2937;font-size:13px;font-weight:700}
.t{fill:#1f2937;font-size:12px;font-weight:600}
.s{fill:#4b5563;font-size:10.5px}
.xs{fill:#6b7280;font-size:9.5px}
