</style>
<rect x="0" y="0" width="900" height="700" fill="#ffffff"/>
<text x="450" y="24" class="h" text-anchor="middle" font-size="14">模块与组件图 · 对齐当前代码树</text>
<text x="450" y="42" class="xs" text-anchor="middle">产品 v1.5.0-beta · 箭头=调用/依赖方向 · 计算层不依赖展示层</text>

<!-- 入口 -->
