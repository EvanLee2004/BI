<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>账号登录与权限分流 v2.0</title>
<style>
.h{fill:#0f172a;font-size:14px;font-weight:700}
.t{fill:#0f172a;font-size:12px;font-weight:600}
.s{fill:#334155;font-size:11px}
.xs{fill:#64748b;font-size:10px}
.lbl{fill:#475569;font-size:11px;font-weight:700}
.ln{stroke:#475569;stroke-width:1.4;fill:none;marker-end:url(#a)}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker>
</defs>
<rect width="960" height="680" fill="#ffffff"/>
<text x="480" y="26" class="h" text-anchor="middle">账号登录与权限分流</text>
<text x="480" y="46" class="xs" text-anchor="middle">同一入口 http://&lt;内网IP&gt;/ · 账号表 数据/看板账号.json · BU 表 数据/BU配置.json · v2.0.0-rc12</text>

<rect x="340" y="64" width="280" height="52" rx="8" fill="#0f172a"/>
<text x="480" y="86" fill="#fff" font-weight="700" text-anchor="middle">浏览器 → GET / 或 /admin</text>
<text x="480" y="104" fill="#cbd5e1" font-size="10" text-anchor="middle">未登录 → Vue LoginView /login</text>

<path class="ln" d="M480 116 L480 140"/>

<rect x="300" y="140" width="360" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
<text x="480" y="164" class="t" text-anchor="middle">账号 + 密码 · 点「进入」</text>
<text x="480" y="182" class="xs" text-anchor="middle">POST /api/v1/login · login_guard 防爆破（默认 10 次 / 5 分钟）</text>

<path class="ln" d="M480 196 L480 220"/>

<rect x="280" y="220" width="400" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
<text x="480" y="244" class="t" text-anchor="middle">accounts 鉴权 · 写会话 Cookie</text>
<text x="480" y="262" class="xs" text-anchor="middle">权限 ∈ {管理员, 整体, BU} · 密码版本 · logout/改密踢会话</text>

<path class="ln" d="M340 272 L160 310"/>
<path class="ln" d="M480 272 L480 310"/>
<path class="ln" d="M620 272 L800 310"/>

<rect x="40" y="310" width="240" height="150" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="160" y="338" class="t" text-anchor="middle">权限 = 管理员</text>
<text x="160" y="360" class="s" text-anchor="middle">→ /admin（Vue+EP）</text>
<text x="160" y="382" class="xs" text-anchor="middle">改明细 · 手填/分摊/去税</text>
<text x="160" y="400" class="xs" text-anchor="middle">账号 · 销售归属 · 预算</text>
<text x="160" y="418" class="xs" text-anchor="middle">立即更新 · 一键更新代码</text>
<text x="160" y="436" class="xs" text-anchor="middle">可预览整体/BU 页</text>
<text x="160" y="452" class="xs" text-anchor="middle">改密走管理端设置</text>

<rect x="360" y="310" width="240" height="150" rx="10" fill="#fdf2f8" stroke="#db2777"/>
<text x="480" y="338" class="t" text-anchor="middle">权限 = 整体</text>
<text x="480" y="360" class="s" text-anchor="middle">→ 整体驾驶舱 Vue</text>
<text x="480" y="382" class="xs" text-anchor="middle">全公司 KPI / 利润表 / 结构</text>
<text x="480" y="400" class="xs" text-anchor="middle">顶栏 BU 入口 + 未归属提示</text>
<text x="480" y="418" class="xs" text-anchor="middle">/api/v1/vm · 导出</text>
<text x="480" y="436" class="xs" text-anchor="middle">可进各 /bu/{name}</text>
<text x="480" y="452" class="xs" text-anchor="middle">看端可自改密码</text>

<rect x="680" y="310" width="240" height="150" rx="10" fill="#fdf2f8" stroke="#db2777"/>
<text x="800" y="338" class="t" text-anchor="middle">权限 = BU</text>
<text x="800" y="360" class="s" text-anchor="middle">→ /bu/{绑定BU}</text>
<text x="800" y="382" class="xs" text-anchor="middle">销售名单过滤 summary</text>
<text x="800" y="400" class="xs" text-anchor="middle">他 BU / 整体 403</text>
<text x="800" y="418" class="xs" text-anchor="middle">明细白名单仍生效</text>
<text x="800" y="436" class="xs" text-anchor="middle">多 BU：顶栏只列自己的</text>
<text x="800" y="452" class="xs" text-anchor="middle">看端可自改密码</text>

<text x="40" y="490" class="lbl">配置与安全</text>
<rect x="40" y="500" width="440" height="88" rx="8" fill="#eef2ff" stroke="#6366f1"/>
<text x="56" y="526" class="t">看板账号.json</text>
<text x="56" y="546" class="xs">谁能登录 · 权限 · 密码明文（仅管理员 API 👁）</text>
<text x="56" y="564" class="xs">密码版本：logout / 改密后旧 cookie 401</text>
<text x="56" y="580" class="xs">总账号 lushasha 不可删登录名</text>

<rect x="500" y="500" width="420" height="88" rx="8" fill="#eef2ff" stroke="#6366f1"/>
<text x="516" y="526" class="t">BU配置.json · login_guard</text>
<text x="516" y="546" class="xs">BU 名 + 销售名单 = 子页数字口径</text>
<text x="516" y="564" class="xs">与账号表解耦 · 无密码字段</text>
<text x="516" y="580" class="xs">同账号连续失败锁定（内存计数，重启清零）</text>

<rect x="40" y="608" width="880" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="56" y="630" class="s">生产入口 :80（nginx）· 开发/简易可 :8018 · 会话 Cookie 同源 · 不暴露公网 · 上线必改默认弱密码</text>
<text x="56" y="648" class="xs">明细列白名单对任意会话生效 · 管理员看端不展示自改密码按钮（防误改）</text>
</svg>
