<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>账号登录与权限分流（v1.4.0-beta）</title>
<desc>同一入口 / 账号+密码按权限分流到整体页、BU页、管理端</desc>
<style>
.h{fill:#1f2937;font-size:13px;font-weight:700}
.t{fill:#1f2937;font-size:12px;font-weight:600}
.s{fill:#4b5563;font-size:11px}
.xs{fill:#6b7280;font-size:10px}
.lbl{fill:#6b7280;font-size:11px;font-weight:600}
.ln{stroke:#4b5563;stroke-width:1.4;fill:none;marker-end:url(#a)}
.lo{stroke:#d97706;stroke-width:1.4;fill:none;marker-end:url(#o);stroke-dasharray:4 3}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#4b5563"/></marker>
<marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
</defs>
<rect x="0" y="0" width="900" height="640" fill="#ffffff"/>
<text x="450" y="24" class="h" text-anchor="middle" font-size="14">账号登录与权限分流</text>
<text x="450" y="42" class="xs" text-anchor="middle">同一端口 · 账号表 数据/看板账号.json · BU 归属表 数据/BU配置.json · 产品 v1.4.0-beta</text>

<!-- 入口 -->
<rect x="340" y="60" width="220" height="50" rx="8" fill="#1f2937"/>
<text x="450" y="82" fill="#fff" font-weight="700" text-anchor="middle">浏览器 → GET /</text>
<text x="450" y="98" fill="#d1d5db" font-size="10" text-anchor="middle">未登录 → 登录页</text>

<path class="ln" d="M450 110 L450 140"/>

<rect x="300" y="140" width="300" height="56" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="450" y="164" class="t" text-anchor="middle">账号 + 密码</text>
<text x="450" y="182" class="xs" text-anchor="middle">POST /login 或 POST /api/v1/login · 口令 bytes 比较</text>

<path class="ln" d="M450 196 L450 220"/>

<rect x="280" y="220" width="340" height="48" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
<text x="450" y="242" class="t" text-anchor="middle">accounts 鉴权 · 写会话 Cookie</text>
<text x="450" y="258" class="xs" text-anchor="middle">权限 ∈ {管理员, 整体, BU} · BU 可读 可见BU 列表</text>

<!-- 三分流 -->
<path class="ln" d="M340 268 L160 310"/>
<path class="ln" d="M450 268 L450 310"/>
<path class="ln" d="M560 268 L740 310"/>

<rect x="40" y="310" width="240" height="130" rx="10" fill="#f59e0b1a" stroke="#d97706"/>
<text x="160" y="338" class="t" text-anchor="middle">权限 = 管理员</text>
<text x="160" y="360" class="s" text-anchor="middle">→ /admin</text>
<text x="160" y="382" class="xs" text-anchor="middle">改明细 · 手填/分摊/去税</text>
<text x="160" y="398" class="xs" text-anchor="middle">账号明文 · 销售归属</text>
<text x="160" y="414" class="xs" text-anchor="middle">一键更新 · 设置 · 操作记录</text>
<text x="160" y="430" class="xs" text-anchor="middle">也可预览整体/BU 页</text>

<rect x="330" y="310" width="240" height="130" rx="10" fill="#ec48991a" stroke="#db2777"/>
<text x="450" y="338" class="t" text-anchor="middle">权限 = 整体</text>
<text x="450" y="360" class="s" text-anchor="middle">→ 整体驾驶舱 HTML</text>
<text x="450" y="382" class="xs" text-anchor="middle">四段骨架 · 全部数字</text>
<text x="450" y="398" class="xs" text-anchor="middle">顶栏 BU 入口 + 未归属提示</text>
<text x="450" y="414" class="xs" text-anchor="middle">/api/daily · /export.png 可用</text>
<text x="450" y="430" class="xs" text-anchor="middle">shell + static · /api/v1/cockpit</text>

<rect x="620" y="310" width="240" height="130" rx="10" fill="#ec48991a" stroke="#db2777"/>
<text x="740" y="338" class="t" text-anchor="middle">权限 = BU</text>
<text x="740" y="360" class="s" text-anchor="middle">→ /bu/{第一个绑定BU}</text>
<text x="740" y="382" class="xs" text-anchor="middle">销售名单过滤 summary</text>
<text x="740" y="398" class="xs" text-anchor="middle">多 BU：顶栏只列自己绑定的</text>
<text x="740" y="414" class="xs" text-anchor="middle">daily/整体 export 401（铁律12）</text>
<text x="740" y="430" class="xs" text-anchor="middle">本 BU 可 /bu/x/export.png</text>

<!-- 数据侧 -->
<text x="40" y="470" class="lbl">配置与过滤（库外 JSON）</text>
<rect x="40" y="480" width="400" height="70" rx="8" fill="#6366f11a" stroke="#6366f1"/>
<text x="56" y="504" class="t">看板账号.json</text>
<text x="56" y="524" class="xs">谁能登录 · 权限绑什么 · 密码（明文仅管理员 API 可见）</text>
<text x="56" y="540" class="xs">一账号可绑多个 BU（v8.6）</text>

<rect x="460" y="480" width="400" height="70" rx="8" fill="#6366f11a" stroke="#6366f1"/>
<text x="476" y="504" class="t">BU配置.json</text>
<text x="476" y="524" class="xs">BU 名 + 销售名单 = 子页数字口径（一人一 BU 归属）</text>
<text x="476" y="540" class="xs">无密码字段 · 与账号表解耦</text>

<path class="lo" d="M740 440 L660 480"/>
<text x="700" y="468" class="xs" fill="#d97706">过滤用销售名</text>

<!-- 铁律 -->
<rect x="40" y="570" width="820" height="52" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="56" y="592" class="s">铁律12：BU 页只吃已过滤 summary · 禁止挂整体动态口 · 未知 BU 名 404 · 切换条绝不列他 BU</text>
<text x="56" y="610" class="xs">视图档案 view_profile：full=管理完整 / executive=领导精简（CSS 隐藏公式标注，数字板块全保留）· 自改密码弹窗须提示「密码管理员可见」</text>
</svg>
