<svg viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>关键流程时序图 v2.0</title>
<style>
.h{fill:#0f172a;font-size:13px;font-weight:700}
.actor{fill:#0f172a;font-size:11px;font-weight:600}
.m{fill:#334155;font-size:11px}
.mo{fill:#c2410c;font-size:11px;font-weight:600}
.life{stroke:#94a3b8;stroke-width:1;stroke-dasharray:3 3}
.msg{stroke:#475569;stroke-width:1.3;fill:none;marker-end:url(#a)}
.msgo{stroke:#c2410c;stroke-width:1.3;fill:none;marker-end:url(#ao)}
.box{fill:#dbeafe;stroke:#3b82f6;rx:6}
.note{fill:#ffedd5;stroke:#ea580c;rx:4}
.nt{fill:#9a3412;font-size:10px}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker>
<marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#c2410c"/></marker>
</defs>
<rect width="820" height="640" fill="#ffffff"/>

<text x="20" y="26" class="h">流程A：每日更新管道（cron 定时 / 管理端立即更新，同一入口）</text>
<rect x="20" y="40" width="100" height="28" class="box"/><text x="70" y="58" class="actor" text-anchor="middle">cron/按钮</text>
<rect x="150" y="40" width="100" height="28" class="box"/><text x="200" y="58" class="actor" text-anchor="middle">ingest</text>
<rect x="290" y="40" width="100" height="28" class="box"/><text x="340" y="58" class="actor" text-anchor="middle">看板.db</text>
<rect x="430" y="40" width="100" height="28" class="box"/><text x="480" y="58" class="actor" text-anchor="middle">domain/profit</text>
<rect x="570" y="40" width="100" height="28" class="box"/><text x="620" y="58" class="actor" text-anchor="middle">VM API</text>
<rect x="700" y="40" width="100" height="28" class="box"/><text x="750" y="58" class="actor" text-anchor="middle">Vue 看端</text>

<line x1="70" y1="68" x2="70" y2="300" class="life"/>
<line x1="200" y1="68" x2="200" y2="300" class="life"/>
<line x1="340" y1="68" x2="340" y2="300" class="life"/>
<line x1="480" y1="68" x2="480" y2="300" class="life"/>
<line x1="620" y1="68" x2="620" y2="300" class="life"/>
<line x1="750" y1="68" x2="750" y2="300" class="life"/>

<path class="msg" d="M70 88 L195 88"/><text x="78" y="83" class="m">run --scheduled / 立即更新</text>
<path class="msg" d="M200 114 L335 114"/><text x="208" y="109" class="m">①智云抓+台账 ②规范化</text>
<path class="msg" d="M200 140 L335 140"/><text x="208" y="135" class="m">③写 std_ 标准表</text>
<path class="msgo" d="M340 166 L205 166"/><text x="210" y="161" class="mo">④取生效调整 → 重放</text>
<path class="msg" d="M200 192 L335 192"/><text x="208" y="187" class="m">⑤validate → meta 绿/黄/红</text>
<path class="msg" d="M340 218 L475 218"/><text x="348" y="213" class="m">⑥标准表+manual 算 summary</text>
<path class="msg" d="M480 244 L615 244"/><text x="488" y="239" class="m">⑦序列化 VM /api/v1/*</text>
<path class="msg" d="M620 270 L745 270"/><text x="628" y="265" class="m">⑧浏览器拉 dist+VM 渲染</text>
<rect x="20" y="288" width="280" height="24" class="note"/><text x="28" y="304" class="nt">任一步错：中止·保留旧页·日志记红</text>
<rect x="320" y="288" width="280" height="24" class="note"/><text x="328" y="304" class="nt">月末：自动快照 数据/备份/</text>

<text x="20" y="348" class="h">流程B：管理员改一笔明细（指令重放，不改原始 xlsx）</text>
<rect x="20" y="362" width="110" height="28" class="box"/><text x="75" y="380" class="actor" text-anchor="middle">管理员</text>
<rect x="160" y="362" width="120" height="28" class="box"/><text x="220" y="380" class="actor" text-anchor="middle">管理端 Vue</text>
<rect x="320" y="362" width="100" height="28" class="box"/><text x="370" y="380" class="actor" text-anchor="middle">routes/API</text>
<rect x="460" y="362" width="100" height="28" class="box"/><text x="510" y="380" class="actor" text-anchor="middle">看板.db</text>
<rect x="600" y="362" width="120" height="28" class="box"/><text x="660" y="380" class="actor" text-anchor="middle">重算④→⑦</text>
<rect x="740" y="362" width="60" height="28" class="box"/><text x="770" y="380" class="actor" text-anchor="middle">看端</text>

<line x1="75" y1="390" x2="75" y2="600" class="life"/>
<line x1="220" y1="390" x2="220" y2="600" class="life"/>
<line x1="370" y1="390" x2="370" y2="600" class="life"/>
<line x1="510" y1="390" x2="510" y2="600" class="life"/>
<line x1="660" y1="390" x2="660" y2="600" class="life"/>
<line x1="770" y1="390" x2="770" y2="600" class="life"/>

<path class="msg" d="M75 414 L215 414"/><text x="82" y="409" class="m">明细改值+原因</text>
<path class="msg" d="M220 444 L365 444"/><text x="228" y="439" class="m">POST /api/adjust（会话）</text>
<path class="msg" d="M370 474 L505 474"/><text x="378" y="469" class="m">追加 adj_ 指令行</text>
<path class="msg" d="M510 504 L655 504"/><text x="518" y="499" class="m">触发重算 summary</text>
<path class="msg" d="M660 534 L765 534"/><text x="668" y="529" class="m">刷新后数字更新</text>
<path class="msgo" d="M370 564 L225 564"/><text x="240" y="559" class="mo">操作记录可查（配置变更审计）</text>

<text x="20" y="620" class="m">调度：Ubuntu cron · 进程：systemd kanban · 入口：nginx:80 · 版本 v2.0.0-rc12 · 2026-07-20</text>
</svg>
