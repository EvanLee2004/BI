<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="system-ui,sans-serif" role="img">
  <title>Ubuntu 台式机部署拓扑 v2.0</title>
  <rect width="900" height="360" fill="#0b1220"/>
  <text x="24" y="32" fill="#e2e8f0" font-size="16" font-weight="700">Ubuntu 26.04 台式机部署拓扑 v2.0</text>
  <text x="24" y="52" fill="#64748b" font-size="11">/opt/kanban · 2026-07-20 生产实核</text>
  <rect x="30" y="70" width="840" height="250" rx="12" fill="#111827" stroke="#334155"/>
  <text x="50" y="98" fill="#94a3b8" font-size="12">内网</text>
  <rect x="60" y="120" width="140" height="60" rx="8" fill="#0f766e" stroke="#2dd4bf"/>
  <text x="130" y="155" text-anchor="middle" fill="#ecfeff" font-size="12">nginx:80</text>
  <rect x="240" y="120" width="160" height="60" rx="8" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="320" y="155" text-anchor="middle" fill="#e0f2fe" font-size="12">systemd kanban</text>
  <rect x="440" y="120" width="140" height="60" rx="8" fill="#312e81" stroke="#a78bfa"/>
  <text x="510" y="155" text-anchor="middle" fill="#ede9fe" font-size="12">cron 三套</text>
  <rect x="620" y="120" width="200" height="60" rx="8" fill="#14532d" stroke="#4ade80"/>
  <text x="720" y="155" text-anchor="middle" fill="#dcfce7" font-size="12">数据/ + 看板.db</text>
  <rect x="60" y="220" width="200" height="50" rx="8" fill="#422006" stroke="#fbbf24"/>
  <text x="160" y="250" text-anchor="middle" fill="#fef3c7" font-size="11">智云 + 台账共享盘</text>
  <rect x="300" y="220" width="200" height="50" rx="8" fill="#1f2937" stroke="#94a3b8"/>
  <text x="400" y="250" text-anchor="middle" fill="#e2e8f0" font-size="11">Gitee/GitHub 一键更新</text>
  <rect x="540" y="220" width="280" height="50" rx="8" fill="#1f2937" stroke="#64748b"/>
  <text x="680" y="250" text-anchor="middle" fill="#cbd5e1" font-size="11">:80 对外 · 8018 仅本机 · SSH 运维</text>
  <text x="50" y="300" fill="#64748b" font-size="11">Restart=always · start_with_rollback · journald + 数据/日志/ · 入口 http://&lt;内网IP&gt;/</text>
</svg>
