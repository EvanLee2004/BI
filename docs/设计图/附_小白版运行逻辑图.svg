<!-- stage66 2026-07-21: Vue-only admin, export on-demand, fen Decimal, incremental recompute, gen_vm_ts -->
<svg viewBox="0 0 800 980" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>利润看板·小白版运行逻辑 v2.0</title>
<style>
.big{fill:#0f172a;font-size:15px;font-weight:700}
.t{fill:#0f172a;font-size:13px;font-weight:600}
.s{fill:#334155;font-size:12px}
.step{fill:#ffffff;font-size:13px;font-weight:700}
.ln{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a)}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
</defs>
<rect width="800" height="980" fill="#ffffff"/>

<text x="400" y="30" class="big" text-anchor="middle">这个系统一天是怎么转起来的</text>
<text x="400" y="50" class="s" text-anchor="middle">v2.0.0-rc12 · Ubuntu 生产 · cron 日更 + systemd 自愈 · 手机连公司 Wi‑Fi 打开 http://内网IP/</text>

<circle cx="50" cy="96" r="14" fill="#059669"/><text x="50" y="101" class="step" text-anchor="middle">1</text>
<rect x="80" y="70" width="680" height="52" rx="10" fill="#ecfdf5" stroke="#059669"/>
<text x="96" y="92" class="t">到点了，公司 Ubuntu 自己干活（cron 默认约 09:30，可改）</text>
<text x="96" y="110" class="s">急了可在管理端点「立即更新」；服务挂了由 systemd 自动拉起</text>

<path class="ln" d="M400 122 L400 142"/>

<circle cx="50" cy="172" r="14" fill="#3b82f6"/><text x="50" y="177" class="step" text-anchor="middle">2</text>
<rect x="80" y="146" width="680" height="52" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
<text x="96" y="168" class="t">去把最新的数搬回来</text>
<text x="96" y="186" class="s">智云 4 表自动登录抓 + 收单台账从共享盘取；抓不到用上次的并亮黄灯</text>

<path class="ln" d="M400 198 L400 218"/>

<circle cx="50" cy="248" r="14" fill="#0891b2"/><text x="50" y="253" class="step" text-anchor="middle">3</text>
<rect x="80" y="222" width="680" height="52" rx="10" fill="#ecfeff" stroke="#0891b2"/>
<text x="96" y="244" class="t">洗数：金额、日期、归属月对齐，给每行打稳定定位键</text>
<text x="96" y="262" class="s">异常行进「异常处理」清单，绝不静默算成 0</text>

<path class="ln" d="M400 274 L400 294"/>

<circle cx="50" cy="328" r="14" fill="#d97706"/><text x="50" y="333" class="step" text-anchor="middle">4</text>
<rect x="80" y="298" width="680" height="66" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="96" y="320" class="t">把财务以前改过的数，全部重新改一遍（最关键）</text>
<text x="96" y="338" class="s">每一笔改动记在「调整小本本」；新数搬回来后照本再改，修改永不丢</text>
<text x="96" y="354" class="s">源头变了会标黄让人复核</text>

<path class="ln" d="M400 364 L400 384"/>

<circle cx="50" cy="418" r="14" fill="#7c3aed"/><text x="50" y="423" class="step" text-anchor="middle">5</text>
<rect x="80" y="388" width="680" height="52" rx="10" fill="#f5f3ff" stroke="#7c3aed"/>
<text x="96" y="410" class="t">算账：利润表、毛利率、回款、预算%、按客户/销售结构……</text>
<text x="96" y="428" class="s">公共费用分摊到 BU；自我体检绿/黄/红，不对不装没事</text>

<path class="ln" d="M400 440 L400 460"/>

<circle cx="50" cy="500" r="14" fill="#db2777"/><text x="50" y="505" class="step" text-anchor="middle">6</text>
<rect x="80" y="464" width="680" height="78" rx="10" fill="#fdf2f8" stroke="#db2777"/>
<text x="96" y="486" class="t">生成 Vue 页面 + JSON（nginx 对内网开放 :80）</text>
<text x="96" y="504" class="s">· 同一入口登录：整体看全公司 · BU 只看本 BU · 管理员进 /admin</text>
<text x="96" y="522" class="s">· 看端/管理端都是 Vue 真组件；数字全在后端算好，浏览器只显示</text>
<text x="96" y="540" class="s">· 对外不要直连 :8018（只绑本机）；手机开 http://内网IP/</text>

<text x="400" y="576" class="big" text-anchor="middle">财务打开管理页面后，能做的四件事</text>

<rect x="40" y="596" width="350" height="92" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="56" y="620" class="t">① 发现某笔数不对 → 直接改</text>
<text x="56" y="640" class="s">明细里改月份/金额+原因保存，</text>
<text x="56" y="658" class="s">几秒后图表跟着变；改的是「指令」</text>
<text x="56" y="676" class="s">不是改原始 Excel</text>

<rect x="410" y="596" width="350" height="92" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="426" y="620" class="t">② 处理异常与未分类</text>
<text x="426" y="640" class="s">下单没填部门、费用未归类、</text>
<text x="426" y="658" class="s">过期调整、未归属销售……</text>
<text x="426" y="676" class="s">在「异常处理」页逐条消化</text>

<rect x="40" y="704" width="350" height="92" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="56" y="728" class="t">③ 填只有她知道的数</text>
<text x="56" y="748" class="s">手填人力/税费/分摊/去税/预算；</text>
<text x="56" y="766" class="s">当月未填=0（不沿用上月）；</text>
<text x="56" y="784" class="s">销售归属 BU 在设置里勾</text>

<rect x="410" y="704" width="350" height="92" rx="10" fill="#fff7ed" stroke="#d97706"/>
<text x="426" y="728" class="t">④ 更新数据 / 拉新代码</text>
<text x="426" y="748" class="s">「立即更新」重跑抓数算账；</text>
<text x="426" y="766" class="s">「一键更新」git pull + 依赖；</text>
<text x="426" y="784" class="s">坏版本自动回滚</text>

<rect x="40" y="820" width="720" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="56" y="848" class="t">运维小抄（人在公司 / 回家）</text>
<text x="56" y="870" class="s">· 服务：systemctl status kanban · 挂了：sudo systemctl restart kanban</text>
<text x="56" y="890" class="s">· 入口不通但服务活：查 nginx · 处方见 docs/Runbook.md</text>
<text x="56" y="910" class="s">· 每小时体检 + 每天备份；上线后务必改掉默认弱密码</text>
<text x="56" y="928" class="s">· 装机细节：docs/Ubuntu部署手册.md · 远程：公司电脑（部署机）/</text>
</svg>
