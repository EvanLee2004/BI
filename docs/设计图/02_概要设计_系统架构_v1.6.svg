<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="system-ui,sans-serif">
  <rect width="920" height="420" fill="#0b1220"/>
  <text x="24" y="36" fill="#e2e8f0" font-size="18" font-weight="700">经营罗盘架构 v1.6（任务书43 · nginx 双进程）</text>
  <rect x="40" y="70" width="160" height="70" rx="10" fill="#1e293b" stroke="#38bdf8"/>
  <text x="120" y="110" text-anchor="middle" fill="#e2e8f0" font-size="13">浏览器/手机</text>
  <rect x="260" y="60" width="200" height="90" rx="10" fill="#0f766e" stroke="#2dd4bf"/>
  <text x="360" y="95" text-anchor="middle" fill="#ecfeff" font-size="13" font-weight="600">nginx :80</text>
  <text x="360" y="118" text-anchor="middle" fill="#ccfbf1" font-size="11">static + reverse proxy</text>
  <rect x="520" y="60" width="220" height="90" rx="10" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="630" y="95" text-anchor="middle" fill="#e0f2fe" font-size="13" font-weight="600">FastAPI 127.0.0.1:8018</text>
  <text x="630" y="118" text-anchor="middle" fill="#bae6fd" font-size="11">API · 算账 · 渲染</text>
  <rect x="300" y="200" width="180" height="70" rx="10" fill="#312e81" stroke="#a78bfa"/>
  <text x="390" y="240" text-anchor="middle" fill="#ede9fe" font-size="13">static/ 目录</text>
  <rect x="540" y="200" width="200" height="70" rx="10" fill="#14532d" stroke="#4ade80"/>
  <text x="640" y="240" text-anchor="middle" fill="#dcfce7" font-size="13">SQLite 看板.db</text>
  <rect x="40" y="300" width="200" height="70" rx="10" fill="#422006" stroke="#fbbf24"/>
  <text x="140" y="340" text-anchor="middle" fill="#fef3c7" font-size="12">CIFS 台账只读拷入</text>
  <rect x="300" y="300" width="200" height="70" rx="10" fill="#1f2937" stroke="#94a3b8"/>
  <text x="400" y="340" text-anchor="middle" fill="#e2e8f0" font-size="12">飞书 webhook 可选</text>
  <path d="M200 105 H260" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M460 105 H520" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M360 150 V200" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M630 150 V200" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M140 300 V175 H260" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
  <text x="24" y="400" fill="#64748b" font-size="11">直连模式：跳过 nginx，FastAPI 0.0.0.0:8018 自挂 /static（开发/兼容）</text>
