<svg viewBox="0 0 820 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>利润看板架构 v1.5（产品 v1.4.0-beta · 2026-07-15）</title>
<desc>抓数→进料口→清洗→SQLite→计算→展示(账号分流·static外置·/api/v1 JSON)；单向数据流+调度+人工调整回路</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#7a8699"/></marker>
<marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
<marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
</defs>
<style>
.t{fill:#1f2937;font-size:13px;font-weight:600}
.s{fill:#4b5563;font-size:11px}
.xs{fill:#4b5563;font-size:10px}
.lbl{fill:#6b7280;font-size:11px;font-weight:600}
.ln{stroke:#7a8699;stroke-width:1.5;fill:none;marker-end:url(#ar)}
.adj{stroke:#d97706;stroke-width:1.5;fill:none;marker-end:url(#ar2);stroke-dasharray:5 4}
.sch{stroke:#059669;stroke-width:1.5;fill:none;marker-end:url(#ar3);stroke-dasharray:2 3}
.at{fill:#d97706;font-size:11px;font-weight:600}
.gt{fill:#059669;font-size:11px;font-weight:600}
.done{fill:#059669;font-size:10px;font-weight:700}
.half{fill:#d97706;font-size:10px;font-weight:700}
.api{fill:#6366f1;font-size:10px;font-weight:700}
</style>
<rect x="0" y="0" width="820" height="780" fill="#ffffff"/>

<!-- 标题条 -->
<text x="410" y="22" class="t" text-anchor="middle" font-size="14">甲骨易智能经营罗盘 · 系统架构 v1.5</text>
<text x="410" y="38" class="xs" text-anchor="middle">产品 v1.4.0-beta · 五层单向 · CSS/JS 外置 · JSON API · 无 React/npm</text>

<!-- ① 抓数层 -->
<text x="20" y="58" class="lbl">① 抓数层（采集：搬进进料口 · 抓不到自动沿用本地副本+体检黄）</text>
<rect x="20" y="66" width="130" height="72" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="85" y="86" class="t" text-anchor="middle">智云四源</text>
<text x="85" y="103" class="xs" text-anchor="middle">账号密码自动登录</text>
<text x="85" y="118" class="xs" text-anchor="middle">在线抓·5秒内网探测</text>
<text x="85" y="131" class="done" text-anchor="middle">● 已建 · 译员◧待账号</text>
<rect x="162" y="66" width="130" height="72" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="227" y="86" class="t" text-anchor="middle">收单台账</text>
<text x="227" y="103" class="xs" text-anchor="middle">SMB 内网共享</text>
<text x="227" y="118" class="xs" text-anchor="middle">定时抓取(fetch.py)</text>
<text x="227" y="131" class="half" text-anchor="middle">◧ 部署机生效</text>
<rect x="304" y="66" width="130" height="72" rx="8" fill="#3b82f61a" stroke="#3b82f6"/>
<text x="369" y="86" class="t" text-anchor="middle">手工维护</text>
<text x="369" y="103" class="xs" text-anchor="middle">管理端表单填</text>
<text x="369" y="118" class="xs" text-anchor="middle">手填/分摊/去税/预算</text>
<text x="369" y="131" class="done" text-anchor="middle">● 已做 · 当月未填=0</text>

<!-- 调度 -->
<rect x="460" y="66" width="340" height="52" rx="8" fill="#10b9811a" stroke="#059669"/>
<text x="630" y="88" class="gt" text-anchor="middle" font-size="13">调度触发</text>
<text x="630" y="106" class="s" text-anchor="middle">可多时段自动(设置页) + 「立即更新」异步 + 一键更新/看门狗</text>
<path class="sch" d="M460 118 L440 148 L430 158"/>
<text x="445" y="140" class="gt">触发整条管道</text>

<path class="ln" d="M85 138 L85 158"/>
<path class="ln" d="M227 138 L227 158"/>
<path class="ln" d="M369 138 L369 158"/>

<!-- 进料口 -->
<text x="20" y="155" class="lbl">进料口（抓数层 ↔ 清洗层唯一接缝）</text>
<rect x="20" y="160" width="414" height="48" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-dasharray="5 4"/>
<text x="227" y="180" class="t" text-anchor="middle">数据／ 目录　=　6 源 xlsx + 手填库 + 账号/BU/智云配置</text>
<text x="227" y="197" class="xs" text-anchor="middle">换数据源/抓取方式只动①；进料口以下②~⑤全不动 · 数据/ 不进 git</text>

<path class="ln" d="M227 208 L227 228"/>

<!-- ② 清洗层 -->
<text x="20" y="224" class="lbl">② 清洗层（读进料口 → 标准表 → 重放调整）</text>
<rect x="20" y="232" width="414" height="58" rx="8" fill="#06b6d41a" stroke="#0891b2"/>
<text x="227" y="253" class="t" text-anchor="middle">readers → normalize → adjust（ingest 管道）</text>
<text x="227" y="270" class="xs" text-anchor="middle">金额/日期/归属月/行哈希定位键 · 同名列空不盖有值</text>
<text x="227" y="284" class="xs" text-anchor="middle">重放调整 · 过期疑似标黄 · 定位键失配计 missing</text>

<path class="ln" d="M227 290 L227 312"/>

<!-- ③ 存储层 -->
<text x="20" y="308" class="lbl">③ 存储层（SQLite 单文件 · 后端私有资产）</text>
<rect x="20" y="316" width="414" height="72" rx="8" fill="#10b9811a" stroke="#059669"/>
<text x="227" y="338" class="t" text-anchor="middle">std_ 标准表（程序生成 · 永不手改 · 可全量重建）</text>
<text x="227" y="356" class="s" text-anchor="middle">每日 db+页面快照滚动备份 · 同天只留最后一次</text>
<text x="227" y="374" class="s" text-anchor="middle">月末快照永久存档（12-31=年末档）</text>

<rect x="460" y="316" width="340" height="72" rx="8" fill="#f59e0b1a" stroke="#d97706"/>
<text x="630" y="338" class="at" text-anchor="middle" font-size="13">人工表（重建永不清）</text>
<text x="630" y="356" class="s" text-anchor="middle">adj_调整(只追加可撤销) · manual_手填/分摊/去税</text>
<text x="630" y="374" class="s" text-anchor="middle">预算 · 配置变更留痕(C3·不存密码明文)</text>

<path class="adj" d="M630 316 L630 261 L434 261"/>
<text x="640" y="294" class="at">每次重抓后重放</text>

<path class="ln" d="M227 388 L227 410"/>

<!-- ④ 计算层 -->
<text x="20" y="406" class="lbl">④ 计算层（纯函数 · 前端零金额运算）</text>
<rect x="20" y="414" width="414" height="58" rx="8" fill="#8b5cf61a" stroke="#7c3aed"/>
<text x="227" y="435" class="t" text-anchor="middle">profit：只读库 → summary（32 周期矩阵）</text>
<text x="227" y="452" class="xs" text-anchor="middle">P&amp;L · 回款下单率 · 预算% · 收入/毛利结构 · 排名</text>
<text x="227" y="466" class="xs" text-anchor="middle">BU 按销售过滤 · 公共费用按月分摊 · 去税率源头统一</text>

<path class="ln" d="M120 472 L120 500"/>
<path class="ln" d="M227 472 L227 500"/>
<path class="ln" d="M340 472 L340 500"/>

<!-- ⑤ 展示层 -->
<text x="20" y="496" class="lbl">⑤ 展示层（FastAPI :8018 · 账号分流 · v1.4 资源外置 + JSON API）</text>

<!-- 用户端整体 -->
<rect x="20" y="504" width="168" height="128" rx="8" fill="#ec48991a" stroke="#db2777"/>
<text x="104" y="526" class="t" text-anchor="middle">整体用户端</text>
<text x="104" y="544" class="xs" text-anchor="middle">权限=「整体」·只读</text>
<text x="104" y="560" class="s" text-anchor="middle">四段骨架 + 周期日历</text>
<text x="104" y="576" class="s" text-anchor="middle">shell.html → fetch 视图</text>
<text x="104" y="592" class="s" text-anchor="middle">static/css + cockpit.js</text>
<text x="104" y="608" class="s" text-anchor="middle">PNG 导出 · 主题切换</text>
<text x="104" y="622" class="done" text-anchor="middle">● 账号登录已建</text>

<!-- BU 页 -->
<rect x="200" y="504" width="168" height="128" rx="8" fill="#ec48991a" stroke="#db2777"/>
<text x="284" y="526" class="t" text-anchor="middle">BU 独立页</text>
<text x="284" y="544" class="xs" text-anchor="middle">权限=BU / 可绑多 BU</text>
<text x="284" y="560" class="s" text-anchor="middle">销售名单过滤·严格隔离</text>
<text x="284" y="576" class="s" text-anchor="middle">对齐整体页板块</text>
<text x="284" y="592" class="s" text-anchor="middle">cockpit-bu.js · 本页导出</text>
<text x="284" y="608" class="s" text-anchor="middle">不泄他 BU 名/数</text>
<text x="284" y="622" class="done" text-anchor="middle">● 铁律12 已测</text>

<!-- 管理端 -->
<rect x="380" y="504" width="200" height="128" rx="8" fill="#f59e0b1a" stroke="#d97706"/>
<text x="480" y="526" class="at" text-anchor="middle" font-size="13">管理员端 /admin</text>
<text x="480" y="544" class="xs" text-anchor="middle">权限=「管理员」</text>
<text x="480" y="560" class="s" text-anchor="middle">明细改数 · 手填/分摊/去税</text>
<text x="480" y="576" class="s" text-anchor="middle">销售归属 · 账号与权限</text>
<text x="480" y="592" class="s" text-anchor="middle">异常处理 · 操作记录</text>
<text x="480" y="608" class="s" text-anchor="middle">一键更新 · 设置 · 体检</text>
<text x="480" y="622" class="half" text-anchor="middle">◧ HTML 仍在 server.py</text>

<!-- API 边界 -->
<rect x="600" y="504" width="200" height="128" rx="8" fill="#6366f11a" stroke="#6366f1"/>
<text x="700" y="526" class="t" text-anchor="middle" fill="#4f46e5">API 边界 (v1.4)</text>
<text x="700" y="546" class="api" text-anchor="middle">GET /api/v1/cockpit</text>
<text x="700" y="562" class="xs" text-anchor="middle">JSON · numbers 与 golden 全等</text>
<text x="700" y="578" class="api" text-anchor="middle">GET /api/v1/cockpit/view</text>
<text x="700" y="594" class="xs" text-anchor="middle">像素级 HTML（render 原样）</text>
<text x="700" y="610" class="xs" text-anchor="middle">/api/v1/cockpit/bu/{name}</text>
<text x="700" y="622" class="xs" text-anchor="middle">session · login · logout</text>

<!-- 回路 -->
<path class="adj" d="M580 568 L700 568 L700 388 L434 388"/>
<text x="590" y="556" class="at">保存 → 写调整/手填</text>
<path class="sch" d="M580 620 L800 620 L800 118 L800 92"/>
<text x="610" y="638" class="gt">立即更新 / 一键更新 → 调度</text>

<!-- 图例 -->
<rect x="20" y="650" width="780" height="110" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="36" y="672" class="lbl">图例与契约</text>
<text x="36" y="692" class="s">实线 = 单向数据流　　绿点线 = 调度触发（定时 / 立即更新 / 一键更新）　　橙虚线 = 人工调整回路（改指令不改原始）</text>
<text x="36" y="710" class="s">① 进料口是唯一接缝　　② 库只给后端碰，浏览器只经 HTTP　　③ 抓数失败永不中断管道（local_fallback + 体检黄）</text>
<text x="36" y="728" class="s">④ 前端零金额运算（预渲染 .pv 块 + 显示串 *_disp）　　⑤ 主看端 static/ 外置；管理端巨型 HTML 诚实仍在 server.py</text>
<text x="36" y="746" class="done">● 已建　　◧ 半做/诚实边界　　—— 架构图 v1.5 · 对齐产品 v1.4.0-beta（2026-07-15）· 回退：KANBAN_LEGACY_INLINE=1 或 git reset --hard efacf8c</text>
</svg>
