<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>跳转登录 · 经营看板</title>
<meta http-equiv="refresh" content="0;url=/login?next=%2Fadmin">
<link rel="icon" href="/favicon.ico" sizes="any">
<script>
/* 2.5.0：废除独立管理端登录门面；书签/旧链统一到 /login */
(function () {
  try {
    location.replace("/login?next=" + encodeURIComponent("/admin"));
  } catch (e) {
    location.href = "/login?next=%2Fadmin";
  }
})();
</script>
</head>
<body>
<p style="font-family:system-ui,sans-serif;padding:24px">
  正在跳转到统一登录…
  <a href="/login?next=%2Fadmin">若未自动跳转请点此</a>
</p>
</body>
</html>
