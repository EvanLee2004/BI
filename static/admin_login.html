<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>经营罗盘·管理端登录</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script>try{if(localStorage.getItem("cockpit-theme")==="light")document.documentElement.classList.add("theme-light")}catch(e){}</script>
<style>
:root{--bg:#0f172a;--card:#1e293b;--fg:#e2e8f0;--mut:#94a3b8;--line:#334155;--input-bg:#0f172a;--hint:#64748b;--err:#f87171}
html.theme-light{--bg:#eef1f5;--card:#fff;--fg:#1d2836;--mut:#525c68;--line:#e3e8ef;--input-bg:#fff;--hint:#64748b;--err:#dc2626}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);
display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;position:relative}
.card{background:var(--card);padding:32px;border-radius:10px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid var(--line)}
h1{font-size:16px;margin:0 0 16px}label{font-size:12px;color:var(--mut)}
input{width:100%;box-sizing:border-box;margin:8px 0 16px;padding:12px;border-radius:6px;
border:1px solid var(--line);background:var(--input-bg);color:var(--fg);font-size:14px}
/* 54.9 R6：主 CTA scifi 青，禁止紫 */
button[type=submit]{width:100%;padding:12px 16px;border:1px solid #22d3ee;border-radius:8px;
background:linear-gradient(90deg,#0891b2,#22d3ee);color:#04101c;font-size:16px;font-weight:600;cursor:pointer}
button[type=submit]:hover{filter:brightness(1.06)}
.err{color:var(--err);font-size:12px;margin-bottom:8px;display:none}
.hint{color:var(--hint);font-size:12px;margin-top:12px}
#themeBtn{position:fixed;top:16px;right:16px;background:transparent;border:1px solid var(--line);color:var(--fg);
padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;min-height:44px}
#themeBtn:hover{border-color:#22d3ee}
</style>
</head>
<body>
<button type="button" id="themeBtn" title="深色/浅色（全局同步）">◑ 浅色</button>
<form class="card" id="loginForm">
<h1>管理员端登录</h1>
<div class="err" id="errBox"></div>
<label>账号</label><input name="account" id="account" value="lushasha" autocomplete="username" autofocus>
<label>密码</label><input type="password" name="password" id="password" autocomplete="current-password">
<button type="submit">进入</button>
<div class="hint">管理员账号见「看板账号」表（默认 lushasha）。</div>
</form>
<script>
(function(){
  var r=document.documentElement,b=document.getElementById("themeBtn");
  function setL(l){r.classList.toggle("theme-light",!!l);if(b)b.textContent=l?"◐ 深色":"◑ 浅色";}
  try{setL(localStorage.getItem("cockpit-theme")==="light");}catch(e){}
  if(b)b.onclick=function(){var l=!r.classList.contains("theme-light");try{localStorage.setItem("cockpit-theme",l?"light":"dark");}catch(e){}setL(l);};
  window.addEventListener("storage",function(e){if(e.key==="cockpit-theme")setL(e.newValue==="light");});
  var errBox=document.getElementById("errBox");
  var q=new URLSearchParams(location.search);
  if(q.get("msg")){errBox.style.display="block";errBox.textContent=q.get("msg");}
  document.getElementById("loginForm").onsubmit=function(ev){
    ev.preventDefault();
    errBox.style.display="none";
    fetch("/api/v1/login",{
      method:"POST",credentials:"include",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({
        account:document.getElementById("account").value,
        password:document.getElementById("password").value
      })
    }).then(function(res){
      return res.json().then(function(j){return {ok:res.ok,status:res.status,j:j};});
    }).then(function(x){
      if(x.ok && x.j && x.j.redirect){location.replace(x.j.redirect);return;}
      var m=(x.j&& (x.j.detail||x.j.message)) || "账号或密码不正确";
      if(typeof m!=="string") m="账号或密码不正确";
      errBox.style.display="block";errBox.textContent=m;
    }).catch(function(){
      errBox.style.display="block";errBox.textContent="网络错误，请重试";
    });
  };
})();
</script>
</body>
</html>
