<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>看板登录 · 甲骨易智能经营罗盘</title>
<script>try{{var v2=localStorage.getItem("cockpit-theme-v2");var t=localStorage.getItem("cockpit-theme");if(!v2){{t="neon";localStorage.setItem("cockpit-theme","neon");localStorage.setItem("cockpit-theme-v2","1");}}if(t!=="neon"&&t!=="dark"&&t!=="light")t="neon";document.documentElement.setAttribute("data-theme",t);if(t==="light")document.documentElement.classList.add("theme-light");else document.documentElement.classList.remove("theme-light");}}catch(e){{}}</script>
<style>
:root{{--bg:#0f172a;--card:#1e293b;--fg:#e2e8f0;--mut:#94a3b8;--line:#334155;--input-bg:#0f172a;--hint:#64748b;--err:#f87171}}
html.theme-light{{--bg:#eef1f5;--card:#fff;--fg:#1d2836;--mut:#525c68;--line:#e3e8ef;--input-bg:#fff;--hint:#64748b;--err:#dc2626}}
body{{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--fg);
display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;position:relative}}
.card{{background:var(--card);padding:32px;border-radius:10px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid var(--line)}}
h1{{font-size:16px;margin:0 0 16px}}label{{font-size:12px;color:var(--mut)}}
input{{width:100%;box-sizing:border-box;margin:8px 0 16px;padding:12px;border-radius:6px;
border:1px solid var(--line);background:var(--input-bg);color:var(--fg);font-size:14px}}
button[type=submit]{{width:100%;padding:12px 16px;border:1px solid #22d3ee;border-radius:8px;
background:linear-gradient(90deg,#0891b2,#22d3ee);color:#04101c;font-size:16px;font-weight:600;cursor:pointer}}
.err{{color:var(--err);font-size:12px;margin-bottom:8px}}
.hint{{color:var(--hint);font-size:12px;margin-top:12px}}
#themeBtn{{position:fixed;top:16px;right:16px;background:transparent;border:1px solid var(--line);color:var(--fg);
padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;min-height:44px}}
#themeBtn:hover{{border-color:#22d3ee}}
</style></head>
<body>
<button type="button" id="themeBtn" title="深色/浅色（全局同步）">◑ 浅色</button>
<form class="card" method="post" action="/login">
<h1>看板登录</h1>{err}
<label>账号</label><input name="account" value="{account}" autocomplete="username" autofocus>
<label>密码</label><input type="password" name="password" autocomplete="current-password">
<button type="submit">进入</button>
<div class="hint">账号密码问财务部管理员要；登录后可自己改密码。忘记密码找管理员重置。</div></form>
<script>
(function(){{var r=document.documentElement,b=document.getElementById("themeBtn");
var CYCLE=["neon","dark","light"];
function norm(v){{return (v==="neon"||v==="dark"||v==="light")?v:"neon";}}
function nextLabel(m){{return m==="neon"?"◐ 深色":m==="dark"?"◑ 浅色":"◈ 霓虹";}}
function setT(t){{t=norm(t);r.setAttribute("data-theme",t);r.classList.toggle("theme-light",t==="light");if(b)b.textContent=nextLabel(t);try{{localStorage.setItem("cockpit-theme",t);localStorage.setItem("cockpit-theme-v2","1");}}catch(e){{}}}}
try{{setT(localStorage.getItem("cockpit-theme"));}}catch(e){{setT("neon");}}
if(b)b.onclick=function(){{var cur=norm(r.getAttribute("data-theme"));var i=CYCLE.indexOf(cur);setT(CYCLE[(i<0?0:i+1)%3]);}};
window.addEventListener("storage",function(e){{if(e.key==="cockpit-theme")setT(e.newValue);}});}})();
</script></body></html>
