<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>跳转登录 · 经营看板</title>
<meta http-equiv="refresh" content="0;url=/login?next=%2Fadmin">
<script>
/* 2.5.0 遗留模板：不再渲染独立管理登录表单；仅兼容合同清单与旧引用 */
(function () {
  try {
    location.replace("/login?next=" + encodeURIComponent("/admin"));
  } catch (e) {
    location.href = "/login?next=%2Fadmin";
  }
})();
</script>
</head>
<body>
<p><a href="/login?next=%2Fadmin">进入统一登录</a></p>
</body>
</html>
