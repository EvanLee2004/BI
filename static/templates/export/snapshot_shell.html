<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>__TITLE__</title>
<script>
try {
  var v2 = localStorage.getItem('cockpit-theme-v2');
  var t = localStorage.getItem('cockpit-theme');
  if (!v2) {
    t = 'neon';
    localStorage.setItem('cockpit-theme', 'neon');
    localStorage.setItem('cockpit-theme-v2', '1');
  }
  if (t !== 'neon' && t !== 'dark' && t !== 'light') t = 'neon';
  document.documentElement.setAttribute('data-theme', t);
  if (t === 'light') document.documentElement.classList.add('theme-light');
  else document.documentElement.classList.remove('theme-light');
} catch (e) {}
</script>
<style>__THEME_CSS__</style>

</body>
