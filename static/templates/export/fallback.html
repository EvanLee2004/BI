<!DOCTYPE html>
<html lang="zh-CN" data-export-vue="1" data-export-fallback="1">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{title} · 导出</title>
<style>
{css}
body {{ margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--bg,#0b1220); color: var(--fg,#e2e8f0); }}
.export-banner {{ background:#1e3a5f; color:#e0f2fe; padding:10px 16px; font-size:13px; }}
.topbar {{ display:flex; align-items:center; gap:12px; padding:14px 18px;
  border-bottom:1px solid var(--line,#334155); }}
.wrap {{ padding:18px; max-width:1200px; margin:0 auto; }}
.kpi-grid {{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }}
.sec {{ margin:22px 0 10px; font-weight:700; }}
.muted {{ color: var(--mut,#94a3b8); font-size:13px; }}
.pl td {{ padding:6px 8px; border-bottom:1px solid var(--line,#334155); font-size:13px; }}
.kpi-card {{ border:1px solid var(--line,#334155); border-radius:12px; padding:14px 16px; background:var(--card,#1e293b); }}
.kpi-card .k {{ font-size:12px; color:var(--mut,#94a3b8); }}
.kpi-card .v {{ font-size:22px; font-weight:700; margin-top:6px; }}
.kpi-card .u {{ font-size:12px; margin-left:4px; }}
</style>
</head>
<body>
<div class="export-banner">导出快照 · {period} · Vue 结构降级壳（图表以在线页为准） · {version}</div>
<header class="topbar">
  <div class="tb-title"><b>甲骨易</b> 智能经营罗盘{bu_suffix}</div>
  <span class="muted">{period}</span>
</header>
<div class="wrap">
  <section class="sec">一 · 基本情况</section>
  <div class="kpi-grid">{cards}</div>
  <section class="sec">二 · 经营利润（摘要）</section>
  {pl}
  <p class="muted" style="margin-top:24px">本文件由经营罗盘导出；完整交互与图表请在看板在线查看。</p>
</div>
<script type="application/json" id="export-meta">{meta_json}</script>
</body>
</html>
