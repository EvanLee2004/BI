# 看板正式程序 · push/PR 全量闸门
# 对应落地包：KANBAN_OFFLINE=1 sh tests/run_verify.sh + pre-commit --all-files
# 防假绿：必须用仓库内 tests/fixtures/ci_data 播种 数据/；缺 fixtures 显式失败
# 任务书50·D.4：dist 与 git 一致（硬闸）；pip-audit/npm audit 高危硬闸
name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit==4.6.0
      - name: Run pre-commit
        run: pre-commit run --all-files

  run-verify:
    name: run_verify
    runs-on: ubuntu-latest
    env:
      KANBAN_OFFLINE: "1"
      KANBAN_CI: "1"
      KANBAN_VERIFY_JOBS: "2"
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install httpx==0.28.1

      - name: Seed CI fake data into 数据/
        run: |
          set -e
          mkdir -p 数据
          if [ -d tests/fixtures/ci_data ]; then
            cp -R tests/fixtures/ci_data/* 数据/ || true
            find tests/fixtures/ci_data -name '*.xlsx' -exec cp {} 数据/ \;
            mkdir -p _golden_data
            find tests/fixtures/ci_data -name '*.xlsx' -exec cp {} _golden_data/ \;
            echo "Seeded from tests/fixtures/ci_data"
            ls -la 数据/
          else
            echo "::error::缺少 tests/fixtures/ci_data/。请先提交 6 个合成 xlsx。"
            exit 1
          fi
          test -f 数据/项目明细.xlsx

      - name: Run full verify
        run: |
          # 铁律20：禁止 | tail 吞退出码；本步直接 sh，真实退出码即 job 结果
          sh tests/run_verify.sh

  frontend-build:
    name: frontend build + dist-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Snapshot committed dist
        run: |
          set -e
          test -f frontend/dist/index.html
          # 备份 git 内 dist，供 clean build 后 diff
          rm -rf /tmp/kanban_dist_git
          cp -a frontend/dist /tmp/kanban_dist_git
      - name: npm ci && build (clean)
        working-directory: frontend
        run: |
          set -e
          npm ci
          npm run build
      - name: dist must exist after build
        run: test -f frontend/dist/index.html
      - name: dist-diff vs git（防手改 dist）
        run: |
          set -e
          # 忽略 map 与时间戳噪音：比 index.html + assets 文件名集合 + 主 js 体积阈值
          echo "== index.html =="
          diff -u /tmp/kanban_dist_git/index.html frontend/dist/index.html
          echo "== assets 文件名集合 =="
          (cd /tmp/kanban_dist_git/assets && ls -1 | sort) > /tmp/dist_git_assets.txt
          (cd frontend/dist/assets && ls -1 | sort) > /tmp/dist_build_assets.txt
          diff -u /tmp/dist_git_assets.txt /tmp/dist_build_assets.txt
          echo "== 主 bundle 字节一致 =="
          for f in /tmp/kanban_dist_git/assets/index-*.js; do
            base=$(basename "$f")
            cmp -s "$f" "frontend/dist/assets/$base" || { echo "mismatch $base"; exit 1; }
          done
          echo "dist-diff OK"

  security-audit:
    name: npm/pip audit (hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: pip-audit
        run: |
          set -e
          python -m pip install -U pip
          pip install "pip-audit==2.7.3"
          # 无高危才绿；失败即 job 红（禁止 || echo 软失败）
          pip-audit -r requirements.txt
      - name: npm audit
        working-directory: frontend
        run: |
          set -e
          npm ci
          # 高危及以上失败（禁止 || echo 软失败）
          npm audit --audit-level=high

  backup-restore:
    name: backup restore drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run restore test
        run: python tests/run_test.py tests/test_backup_restore.py
